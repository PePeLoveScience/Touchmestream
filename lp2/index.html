<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta name="robots" content="noindex,nofollow" />
  <title>Bonus Access</title>
  <link rel="stylesheet" href="styles.css" />

<body>
  <main class="page-shell" aria-label="Bonus access pre-lander">
    <div class="offer-bg" aria-hidden="true"></div>
    <div class="screen-dim" aria-hidden="true"></div>

    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="headline" aria-describedby="bodyText">
      <h1 id="headline" data-i18n="headline">You&rsquo;re one step away!</h1>
      <p id="bodyText" class="body-copy" data-i18n="body">Tap CONTINUE to open your reward chest.</p>

      <a id="continueLink" class="continue-link" href="https://xo.smartsubzone.top/click/1">
        <button id="continueBtn" class="continue-btn" type="button" data-i18n="button">CONTINUE</button>
      </a>
    </section>
  </main>

  <noscript>
    <div class="noscript-box">
      JavaScript is disabled. Tap CONTINUE to open your reward chest.
    </div>
  </noscript>

  <script src="script.js"></script>
</body>
</html>
